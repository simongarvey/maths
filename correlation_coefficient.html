<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Correlation Coefficient Practice</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .header,
    .panel {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .header {
      padding: 28px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    .header p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.6;
      color: #4b5563;
      max-width: 800px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
    }

    .panel {
      padding: 22px;
    }

    .plot-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #eef2f7;
      border-radius: 16px;
      padding: 14px;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      background: white;
      border-radius: 12px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 1.3rem;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option-btn,
    .new-btn {
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .option-btn {
      background: #ffffff;
      border: 2px solid #d1d5db;
      color: #1f2937;
      text-align: left;
    }

    .option-btn:hover:not(:disabled) {
      background: #f9fafb;
      border-color: #6b7280;
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-btn.correct {
      background: #ecfdf5;
      border-color: #10b981;
      color: #065f46;
    }

    .option-btn.wrong {
      background: #fef2f2;
      border-color: #ef4444;
      color: #991b1b;
    }

    .feedback {
      margin-top: 18px;
      min-height: 78px;
      padding: 16px;
      border-radius: 14px;
      background: #f9fafb;
      border: 1px solid #d1d5db;
      display: flex;
      align-items: center;
      line-height: 1.5;
      color: #374151;
    }

    .new-btn {
      margin-top: 18px;
      width: 100%;
      background: #111827;
      color: white;
    }

    .new-btn:hover {
      opacity: 0.92;
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>Correlation Coefficient Practice</h1>
      <p>
        Look at the scatterplot and choose the correlation coefficient that best matches it.
        Each round includes one correct answer and three clearly different alternatives.
      </p>
    </div>

    <div class="layout">
      <div class="panel">
        <div class="plot-wrap">
          <svg id="plot" viewBox="0 0 100 100" aria-label="scatterplot"></svg>
        </div>
      </div>

      <div class="panel">
        <h2>Choose the correlation coefficient</h2>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback">Select an answer to see feedback.</div>
        <button class="new-btn" id="newBtn">New Scatterplot</button>
      </div>
    </div>
  </div>

  <script>
    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function mean(values) {
      return values.reduce((a, b) => a + b, 0) / values.length;
    }

    function correlation(xs, ys) {
      const xMean = mean(xs);
      const yMean = mean(ys);
      let numerator = 0;
      let xDen = 0;
      let yDen = 0;

      for (let i = 0; i < xs.length; i++) {
        const dx = xs[i] - xMean;
        const dy = ys[i] - yMean;
        numerator += dx * dy;
        xDen += dx * dx;
        yDen += dy * dy;
      }

      const denominator = Math.sqrt(xDen * yDen);
      return denominator === 0 ? 0 : numerator / denominator;
    }

    function roundTo2(value) {
      return Math.round(value * 100) / 100;
    }

    function formatCoeff(value) {
      const rounded = roundTo2(value);
      if (Object.is(rounded, -0)) return "0.00";
      return rounded.toFixed(2);
    }

    function generateTargetR() {
      return randomBetween(-0.95, 0.95);
    }

    function generateScatterData() {
      let xs = [];
      let ys = [];
      let r = 0;

      while (true) {
        const targetR = generateTargetR();

        xs = Array.from({ length: 20 }, function() {
          return randomBetween(0, 20);
        });

        const noiseLevel = clamp(1.1 - Math.abs(targetR), 0.1, 1);
        const slope = targetR * randomBetween(0.8, 1.2);

        ys = xs.map(function(x) {
          return slope * x + randomBetween(-10, 10) * noiseLevel + randomBetween(-2, 2);
        });

        if (Math.abs(targetR) < 0.08) {
          ys = xs.map(function() {
            return randomBetween(0, 20);
          });
        }

        r = correlation(xs, ys);

        if (r >= -0.97 && r <= 0.97) break;
      }

      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);

      const points = xs.map(function(x, i) {
        return {
          x: ((x - minX) / (maxX - minX || 1)) * 95 + 3,
          y: 100 - (((ys[i] - minY) / (maxY - minY || 1)) * 95 + 3)
        };
      });

      return {
        points: points,
        actualR: roundTo2(r)
      };
    }

    function distinctChoice(existing, candidate) {
      return existing.every(function(v) {
        return Math.abs(v - candidate) >= 0.2;
      });
    }

    function generateDecoy(actual, used) {
      for (let tries = 0; tries < 300; tries++) {
        let candidate;
        const mode = Math.floor(Math.random() * 4);

        if (mode === 0) {
          candidate = -actual + randomBetween(-0.2, 0.2);
        } else if (mode === 1) {
          candidate = actual + (actual >= 0 ? -1 : 1) * randomBetween(0.3, 0.5);
        } else if (mode === 2) {
          candidate = (Math.random() < 0.5 ? -1 : 1) * randomBetween(0.02, 0.25);
        } else {
          candidate = (Math.random() < 0.5 ? -1 : 1) * randomBetween(0.45, 0.95);
        }

        candidate = clamp(roundTo2(candidate), -0.99, 0.99);

        if (Math.abs(candidate - actual) >= 0.2 && distinctChoice(used.concat([actual]), candidate)) {
          return candidate;
        }
      }

      const fallbacks = [-0.9, -0.55, -0.15, 0.12, 0.48, 0.83].filter(function(v) {
        return Math.abs(v - actual) >= 0.2 && distinctChoice(used.concat([actual]), v);
      });

      return fallbacks[0] || (actual > 0 ? -0.7 : 0.7);
    }

    function buildQuestion() {
      const data = generateScatterData();
      const choices = [data.actualR];

      while (choices.length < 4) {
        choices.push(generateDecoy(data.actualR, choices));
      }

      return {
        points: data.points,
        actualR: data.actualR,
        options: shuffleArray(choices)
      };
    }

    const plot = document.getElementById("plot");
    const optionsContainer = document.getElementById("options");
    const feedback = document.getElementById("feedback");
    const newBtn = document.getElementById("newBtn");

    let currentQuestion = null;
    let revealed = false;

    function drawPlot(points) {
      plot.innerHTML = "";

      const xAxis = document.createElementNS("http://www.w3.org/2000/svg", "line");
      xAxis.setAttribute("x1", "0");
      xAxis.setAttribute("x2", "100");
      xAxis.setAttribute("y1", "100");
      xAxis.setAttribute("y2", "100");
      xAxis.setAttribute("stroke", "#9ca3af");
      xAxis.setAttribute("stroke-width", "1");
      plot.appendChild(xAxis);

      const yAxis = document.createElementNS("http://www.w3.org/2000/svg", "line");
      yAxis.setAttribute("x1", "0");
      yAxis.setAttribute("x2", "0");
      yAxis.setAttribute("y1", "0");
      yAxis.setAttribute("y2", "100");
      yAxis.setAttribute("stroke", "#9ca3af");
      yAxis.setAttribute("stroke-width", "1");
      plot.appendChild(yAxis);

      points.forEach(function(point) {
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", point.x);
        circle.setAttribute("cy", point.y);
        circle.setAttribute("r", "2.3");
        circle.setAttribute("fill", "#374151");
        plot.appendChild(circle);
      });
    }

    function renderOptions() {
      optionsContainer.innerHTML = "";

      currentQuestion.options.forEach(function(option) {
        const button = document.createElement("button");
        button.className = "option-btn";
        button.textContent = formatCoeff(option);

        button.addEventListener("click", function() {
          if (revealed) return;
          revealed = true;

          const allButtons = optionsContainer.querySelectorAll("button");
          allButtons.forEach(function(btn) {
            btn.disabled = true;
            const value = Number(btn.dataset.value);
            if (value === currentQuestion.actualR) {
              btn.classList.add("correct");
            }
          });

          if (option === currentQuestion.actualR) {
            feedback.textContent = "Correct. The correlation coefficient is " + formatCoeff(currentQuestion.actualR) + ".";
          } else {
            button.classList.add("wrong");
            feedback.textContent = "Not quite. The correct correlation coefficient is " + formatCoeff(currentQuestion.actualR) + ".";
          }
        });

        button.dataset.value = option;
        optionsContainer.appendChild(button);
      });
    }

    function newScatterplot() {
      currentQuestion = buildQuestion();
      revealed = false;
      feedback.textContent = "Select an answer to see feedback.";
      drawPlot(currentQuestion.points);
      renderOptions();
    }

    newBtn.addEventListener("click", newScatterplot);
    newScatterplot();
  </script>
</body>
</html>
